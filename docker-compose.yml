services:
  mariadb:
    build: ./database
    container_name: koop-mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

  maildev:
    image: maildev/maildev:latest
    container_name: koop-maildev
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "1080:1080"

volumes:
  db-data:
