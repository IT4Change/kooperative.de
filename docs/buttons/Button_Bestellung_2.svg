<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    version="1.1"
    width="600"
    height="180"
    viewBox="0 0 600 180">

    <!-- Basis-Button -->
    <polygon
        id="buttonShape"
        points="
            40,20
            560,20
            580,40
            580,140
            560,160
            40,160
            20,140
            20,40
        "
        fill="#00af8c"
    />

    <!-- Helle Kontur (oben + rechts) -->
    <polygon
        points="
            40,20
            560,20
            580,40
            580,140
        "
        fill="none"
        stroke="url(#lightEdge)"
        stroke-width="6"
        stroke-linejoin="round"
    />

    <!-- Dunkle Kontur (unten + links) -->
    <polygon
        points="
            580,140
            560,160
            40,160
            20,140
            20,40
        "
        fill="none"
        stroke="url(#darkEdge)"
        stroke-width="6"
        stroke-linejoin="round"
    />

    <!-- Text -->
    <text
        x="300"
        y="90"
        font-family="Myriad Pro, Arial, Helvetica, sans-serif"
        font-size="48"
        fill="#ffffff"
        text-anchor="middle"
        dominant-baseline="middle">
        Bestellung
    </text>

</svg>
