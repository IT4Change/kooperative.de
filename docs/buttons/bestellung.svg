<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    version="1.1"
    width="600"
    height="180"
    viewBox="0 0 600 180">

    <!-- Button shape (8 Ecken) -->
    <polygon
        points="
            40,20
            480,20
            500,40
            500,140
            480,160
            40,160
            20,140
            20,40
        "
        fill="#00af8c"
        stroke="#0b3d36"
        stroke-width="4"
    />

    <!-- Text -->
    <text
        x="300"
        y="90"
        font-family="Myriad Pro, Arial, Helvetica, sans-serif"
        font-size="48"
        fill="#ffffff"
        text-anchor="middle"
        dominant-baseline="middle">
        Bestellung
    </text>

</svg>
